<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Ringkasan Hari Ini</h1>
                    <p>Pantau performa dan aktivitas terkini Anda.</p>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="card">
                    <h3 class="card-title">ERD Pesanan <br><span class="card-subtitle">(30 Hari Terakhir)</span></h3>
                    <div class="erd-labels"><span>Dibuat</span><span>Dikirim</span></div>
                </div>
                <div class="card">
                    <h3 class="card-title">ERD Data <br>Produk: Kopi Arabika</h3>
                    <div class="erd-labels erd-labels-wide"><span>Dilihat</span><span>Diklik</span><span>Suka</span><span>Keranjang</span></div>
                </div>
                <div class="card">
                    <h3 class="card-title">Tren Penjualan</h3>
                    <div class="chart-container">
                        <svg viewBox="0 0 100 40" preserveAspectRatio="none" style="width:100%; height:100%;"><path d="M0,40 L0,35 C15,30 30,15 50,5 C70,-5 85,5 100,5 L100,40 Z" fill="#EAF2D3"></path><path d="M0,35 C15,30 30,15 50,5 C70,-5 85,5 100,5" fill="none" stroke="#6D8A21" stroke-width="2.5"></path></svg>
                    </div>
                </div>
                <div class="card">
                    <h3 class="card-title">Data Kunjungan Harian</h3>
                    <div class="chart-container">
                        <svg viewBox="0 0 100 40" preserveAspectRatio="none" style="width:100%; height:100%;"><path d="M5,35 L20,30 L35,35 L50,20 L65,25 L85,15" fill="none" stroke="#6D8A21" stroke-width="2.5"></path></svg>
                    </div>
                </div>
                <div class="card full-width-card">
                    <h3 class="card-title">Campaign Aktif per Hari</h3>
                    <div class="chart-container chart-large">
                        <svg viewBox="0 0 100 40" preserveAspectRatio="none" style="width:100%; height:100%;"><path d="M5,35 L15,33 L25,33 L30,22 L45,22 L50,15 L60,15 L65,18 L75,18 L85,20 L90,20 L100,5" fill="none" stroke="#B4D368" stroke-width="3"></path></svg>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/admin-core.js"></script>
</body>
</html>
