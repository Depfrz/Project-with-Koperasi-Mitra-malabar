<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Akun - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1>Edit Akun</h1>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <a href="kelola-akun.html" class="btn btn-outline">Batal</a>
                    <button type="submit" form="form-akun" class="btn btn-primary">Simpan Perubahan</button>
                </div>
            </div>

            <div class="form-card">
                <h2 class="form-card-title">Informasi Akun</h2>
                <p class="form-card-subtitle">Perbarui data di bawah ini untuk mengubah informasi akun dalam sistem Malabar.</p>

                <form id="form-akun">
                    <input type="hidden" id="input-id">
                    
                    <div class="form-group">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" id="input-nama" class="form-control" placeholder="Masukkan nama lengkap sesuai identitas" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password (biarkan kosong jika tidak diubah)</label>
                        <input type="password" id="input-password" class="form-control" placeholder="Masukkan password baru (opsional)">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Nomor Telepon</label>
                            <input type="text" id="input-telp" class="form-control" placeholder="Contoh: 081234567890" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Username</label>
                            <input type="text" id="input-username" class="form-control" placeholder="Masukkan username akun" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Jenis Akun</label>
                        <select id="input-role" class="form-control" required>
                            <option value="">Pilih jenis akun</option>
                            <option value="admin">Admin</option>
                            <option value="leads">Leads (Sales)</option>
                            <option value="campaign">Campaign (Marketing)</option>
                        </select>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/admin-core.js"></script>
    <script src="../js/admin-form-akun.js"></script>
</body>
</html>
