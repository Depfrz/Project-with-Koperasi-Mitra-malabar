<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Kunjungan - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Data Kunjungan</h1>
                    <p>Kelola dan pantau jadwal kunjungan customer Anda.</p>
                </div>
                <a href="tambah-kunjungan.html" class="btn btn-primary">
                    <i class="ph ph-plus" style="margin-right: 0.5rem;"></i>
                    Tambah Kunjungan
                </a>
            </div>

            <div class="filter-container">
                <input type="text" id="search-kunjungan" class="form-control" placeholder="Cari nama customer...">
                <input type="date" id="date-start" class="form-control">
                <input type="date" id="date-end" class="form-control">
                <button class="btn btn-outline">Filter</button>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama Kunjungan</th>
                            <th>Tanggal</th>
                            <th>Tujuan</th>
                            <th style="text-align:right;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="kunjungan-table-body">
                        <tr>
                            <td>1</td>
                            <td>Kunjungan ke Toko A</td>
                            <td>20 Juni 2026</td>
                            <td>Presentasi Produk Baru</td>
                            <td style="text-align:right;">
                                <div class="dropdown-wrapper">
                                    <button class="dropdown-toggle" data-dropdown-toggle="dropdown-kunjungan-1">
                                        <i class="ph ph-dots-three-vertical" style="font-size: 20px;"></i>
                                    </button>
                                    <div class="dropdown-menu" id="dropdown-kunjungan-1">
                                        <button class="dropdown-item">
                                            <i class="ph ph-eye" style="margin-right: 0.5rem;"></i>Lihat Detail
                                        </button>
                                        <button class="dropdown-item">
                                            <i class="ph ph-pencil" style="margin-right: 0.5rem;"></i>Edit
                                        </button>
                                        <button class="dropdown-item danger">
                                            <i class="ph ph-trash" style="margin-right: 0.5rem;"></i>Hapus
                                        </button>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/admin-core.js"></script>
    <script src="../js/admin-kunjungan.js"></script>
</body>
</html>
